name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore dependencies
        run: dotnet restore DistributedTaskEngine.sln
      - name: Build
        run: dotnet build DistributedTaskEngine.sln --no-restore -c Release
      - name: Run tests
        run: dotnet test DistributedTaskEngine.sln --no-build -c Release --logger trx

  test-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  docker:
    name: Build Docker Images
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        run: docker build -f docker/Dockerfile.api -t task-engine-api:${{ github.sha }} .
      - name: Build Worker image
        run: docker build -f docker/Dockerfile.worker -t task-engine-worker:${{ github.sha }} .
      - name: Build Frontend image
        run: docker build -f docker/Dockerfile.frontend -t task-engine-frontend:${{ github.sha }} ./frontend
